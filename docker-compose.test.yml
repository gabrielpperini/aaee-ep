services:
  postgres-test:
    image: postgres:16-alpine
    container_name: aaee-ep-postgres-test
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aaee_ep_test
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aaee_ep_test"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  postgres-test-data:
